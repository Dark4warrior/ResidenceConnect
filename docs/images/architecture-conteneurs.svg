<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 470" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Clients -->
  <rect x="140" y="30" width="200" height="58" rx="8" fill="#eef2ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="240" y="55" font-size="15" fill="#0f172a" text-anchor="middle">App mobile</text>
  <text x="240" y="75" font-size="12" fill="#475569" text-anchor="middle">React Native / Expo</text>

  <rect x="440" y="30" width="200" height="58" rx="8" fill="#eef2ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="540" y="55" font-size="15" fill="#0f172a" text-anchor="middle">Dashboard web</text>
  <text x="540" y="75" font-size="12" fill="#475569" text-anchor="middle">React / Vite</text>

  <!-- Supabase group -->
  <rect x="60" y="210" width="660" height="180" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="80" y="234" font-size="13" fill="#64748b" font-weight="bold">Backend — Supabase</text>

  <rect x="80"  y="255" width="115" height="95" rx="6" fill="#ffffff" stroke="#64748b" stroke-width="1.2"/>
  <text x="137" y="300" font-size="14" fill="#0f172a" text-anchor="middle">Auth</text>
  <text x="137" y="320" font-size="12" fill="#475569" text-anchor="middle">JWT</text>

  <rect x="205" y="255" width="145" height="95" rx="6" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.4"/>
  <text x="277" y="300" font-size="14" fill="#0f172a" text-anchor="middle">PostgreSQL</text>
  <text x="277" y="320" font-size="12" fill="#475569" text-anchor="middle">+ RLS</text>

  <rect x="360" y="255" width="115" height="95" rx="6" fill="#ffffff" stroke="#64748b" stroke-width="1.2"/>
  <text x="417" y="300" font-size="14" fill="#0f172a" text-anchor="middle">Storage</text>
  <text x="417" y="320" font-size="12" fill="#475569" text-anchor="middle">photos</text>

  <rect x="485" y="255" width="110" height="95" rx="6" fill="#ffffff" stroke="#64748b" stroke-width="1.2"/>
  <text x="540" y="307" font-size="14" fill="#0f172a" text-anchor="middle">Realtime</text>

  <rect x="605" y="255" width="105" height="95" rx="6" fill="#ffffff" stroke="#64748b" stroke-width="1.2"/>
  <text x="657" y="300" font-size="14" fill="#0f172a" text-anchor="middle">Edge</text>
  <text x="657" y="320" font-size="12" fill="#475569" text-anchor="middle">Functions</text>

  <!-- Expo Push -->
  <rect x="595" y="412" width="120" height="44" rx="6" fill="#ffffff" stroke="#64748b" stroke-width="1.2"/>
  <text x="655" y="440" font-size="13" fill="#0f172a" text-anchor="middle">Expo Push</text>

  <!-- Arrows (straight) -->
  <line x1="240" y1="88" x2="240" y2="205" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="88" x2="540" y2="205" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="248" y="155" font-size="12" fill="#64748b" text-anchor="start">supabase-js</text>
  <text x="548" y="155" font-size="12" fill="#64748b" text-anchor="start">supabase-js</text>

  <line x1="657" y1="350" x2="657" y2="408" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
